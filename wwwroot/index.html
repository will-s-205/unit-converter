<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Distance Converter</title>
</head>

<body>
    <h2>Miles to Kilometers Converter</h2>

    <label for="miles">Enter Miles:</label>
    <input type="number" id="miles" step="any">
    <button onclick="convert()">Convert</button>

    <h3 id="result"></h3>

    <script>
        async function convert() {
            const miles = document.getElementById('miles').value;
            if (!miles) return;

            const response = await fetch(`/convert?miles=${miles}`);
            const data = await response.json();

            document.getElementById('result').innerText =
                `${miles} miles is ${data.kilometers.toFixed(2)} km`;
        }
    </script>
</body>

</html>
